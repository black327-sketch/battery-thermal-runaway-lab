<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 0;
      height: 0;
      overflow: hidden;
      background: transparent;
    }
  </style>
</head>
<body>
<script>
(function () {
  let lastArgs = {};
  const send = (type, payload) => {
    window.parent.postMessage({ isStreamlitMessage: true, type, ...payload }, "*");
  };
  const ready = () => {
    send("streamlit:componentReady", { apiVersion: 1 });
    send("streamlit:setFrameHeight", { height: 0 });
  };
  const setValue = (value) => {
    send("streamlit:setComponentValue", { value, dataType: "json" });
  };
  window.addEventListener("message", (event) => {
    const data = event.data || {};
    if (data.type !== "streamlit:render") return;
    lastArgs = data.args || {};
  });
  window.addEventListener("message", (event) => {
    const data = event.data || {};
    if (!data || data.kind !== "floating-ai-event") return;
    const eventType = String(data.eventType || "question");
    const question = String(data.question || "").trim();
    if (eventType === "question" && !question) return;
    setValue({
      component_id: lastArgs.component_id || data.componentId || "global",
      event_type: eventType,
      nonce: Date.now(),
      question,
      snapshot: data.snapshot || null
    });
  });
  ready();
})();
</script>
</body>
</html>
